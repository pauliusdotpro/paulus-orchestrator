name: Release Desktop

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.2.3 or v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: 24
  BUN_VERSION: 1.3.11
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        name: Resolve release version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            raw="${{ github.event.inputs.version }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi

          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify lockfile
        run: test -f bun.lock

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            arch: arm64
          - label: macOS x64
            runner: macos-15
            platform: mac
            arch: x64
          - label: Linux x64
            runner: ubuntu-latest
            platform: linux
            arch: x64
          - label: Windows x64
            runner: windows-latest
            platform: win
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Verify lockfile
        run: test -f bun.lock

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Set version in package.json
        shell: bash
        run: |
          cd apps/desktop
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ needs.preflight.outputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Build & Package
        shell: bash
        env:
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          cd apps/desktop

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            required_secrets=(CSC_LINK_BASE64 APPLE_API_KEY_BASE64 APPLE_API_KEY_ID APPLE_API_ISSUER)

            for secret_name in "${required_secrets[@]}"; do
              if [[ -z "${!secret_name:-}" ]]; then
                echo "Missing required macOS release secret: ${secret_name}" >&2
                exit 1
              fi
            done

            mkdir -p .secrets

            node -e "const fs = require('fs'); fs.writeFileSync('.secrets/certificate.p12', Buffer.from(process.env.CSC_LINK_BASE64, 'base64'));"
            export CSC_LINK="$PWD/.secrets/certificate.p12"
            export KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

            security create-keychain -p "" "$KEYCHAIN_PATH"
            security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
            security unlock-keychain -p "" "$KEYCHAIN_PATH"
            security import "$CSC_LINK" -k "$KEYCHAIN_PATH" -P "${CSC_KEY_PASSWORD:-}" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/productbuild
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"
            security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
            security default-keychain -d user -s "$KEYCHAIN_PATH"
            export CSC_KEYCHAIN="$KEYCHAIN_PATH"

            node -e "const fs = require('fs'); fs.writeFileSync('.secrets/notarize-api-key.p8', Buffer.from(process.env.APPLE_API_KEY_BASE64, 'base64'));"
            export APPLE_API_KEY="$PWD/.secrets/notarize-api-key.p8"
            export SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*\"\(Developer ID Application:.*\)\"/\1/p' | head -n 1)"

            if [[ -z "$SIGNING_IDENTITY" ]]; then
              echo "Missing Developer ID Application identity in keychain" >&2
              security find-identity -v -p codesigning "$KEYCHAIN_PATH" >&2 || true
              exit 1
            fi
          fi

          # Build the electron-vite app first
          bunx electron-vite build

          # Build platform artifacts with electron-builder
          args=(--config electron-builder.yml --publish never)

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            args+=(--mac --${{ matrix.arch }})
          elif [[ "${{ matrix.platform }}" == "linux" ]]; then
            args+=(--linux --x64)
          elif [[ "${{ matrix.platform }}" == "win" ]]; then
            args+=(--win --x64)
          fi

          bunx electron-builder "${args[@]}"

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            xcrun stapler staple "dist/mac-${{ matrix.arch }}/Paulus Orchestrator.app"
            codesign --force --sign "$SIGNING_IDENTITY" --timestamp "dist/Paulus-Orchestrator-${{ needs.preflight.outputs.version }}-mac-${{ matrix.arch }}.dmg"
            xcrun notarytool submit "dist/Paulus-Orchestrator-${{ needs.preflight.outputs.version }}-mac-${{ matrix.arch }}.dmg" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
            xcrun stapler staple "dist/Paulus-Orchestrator-${{ needs.preflight.outputs.version }}-mac-${{ matrix.arch }}.dmg"
          fi

      - name: Collect release assets
        shell: bash
        run: |
          mkdir -p release-assets
          cd apps/desktop/dist

          shopt -s nullglob
          for f in *.dmg *.zip *.AppImage *.deb *.rpm *.exe *.blockmap latest*.yml; do
            cp "$f" ../../../release-assets/
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -lah release-assets/ || echo "No assets found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: Paulus Orchestrator v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease == 'true' }}
          make_latest: ${{ needs.preflight.outputs.is_prerelease == 'false' }}
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.deb
            release-assets/*.rpm
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/latest*.yml
